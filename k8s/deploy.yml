apiVersion: v1
kind: Namespace
metadata:
  name: clearfy
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: clearfy-secrets
  namespace: clearfy
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: clearfy-zz-b2
        envSlug: prod
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: clearfy-secret
      secretNamespace: clearfy
      creationPolicy: "Orphan"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clearfy
  namespace: clearfy
  labels:
    app.kubernetes.io/name: clearfy
    app.kubernetes.io/component: api
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: clearfy
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clearfy
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/marcioecom/ai-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3333
          envFrom:
            - secretRef:
                name: clearfy-secret
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: clearfy
  namespace: clearfy
  labels:
    app.kubernetes.io/name: clearfy
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: clearfy
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clearfy
  namespace: clearfy
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: clearfy.marcio.run
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clearfy
                port:
                  number: 80
